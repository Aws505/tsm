# ─────────────────────────────────────────────────────────────────────────────
# tmux.conf — Phone-friendly (Terminus) + SSH session manager
# ─────────────────────────────────────────────────────────────────────────────

# ── Prefix ────────────────────────────────────────────────────────────────────
# Ctrl+a: reachable on every mobile keyboard; backtick alt also bound below
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix          # double-tap to send literal Ctrl+a
bind-key '`' send-prefix          # backtick as second prefix (phone-friendly)

# ── Mouse (tap to select pane/window/session on phone) ───────────────────────
set -g mouse on

# ── Terminal & Colour ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*256col*:Tc"

# ── General ───────────────────────────────────────────────────────────────────
set -g history-limit 20000
set -g base-index 1               # windows start at 1 (easier to hit on phone)
setw -g pane-base-index 1
set -g renumber-windows on
setw -g allow-rename off          # keep our window names stable
set -g set-titles on
set -g set-titles-string "#S / #W"
set -sg escape-time 10            # faster Esc response (important for vim)
set -g focus-events on

# ── Activity monitoring ───────────────────────────────────────────────────────
setw -g monitor-activity on
set  -g visual-activity off       # flash, don't beep

# ── Session quick-switch bindings (prefix + letter) ──────────────────────────
# Mnemonic single-key jumps — no need to open a chooser
bind-key m run-shell 'tmux switch-client -t main  2>/dev/null || tmux display "main session not running"'
bind-key e run-shell 'tmux switch-client -t code  2>/dev/null || tmux display "code session not running"'
bind-key d run-shell 'tmux switch-client -t dev   2>/dev/null || tmux display "dev session not running"'
bind-key x run-shell 'tmux switch-client -t codex 2>/dev/null || tmux display "codex session not running"'
bind-key r run-shell 'tmux switch-client -t relay 2>/dev/null || tmux display "relay session not running"'
bind-key h run-shell 'tmux switch-client -t share 2>/dev/null || tmux display "share session not running"'
bind-key o run-shell 'tmux switch-client -t other 2>/dev/null || tmux display "other session not running"'

# prefix+s  → visual session chooser (built-in tree, arrow-key nav)
bind-key s choose-tree -sZ        # -Z zooms the pane so it's full screen

# prefix+S  → run the interactive session-menu script in main
bind-key S run-shell 'tmux switch-client -t main && tmux send-keys -t main "" Enter'

# ── Pane navigation — no prefix needed (Alt+Arrow, works in Terminus) ─────────
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D

# Pane resize with prefix + HJKL
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Pane split with | and - (more intuitive than " and %)
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same dir
bind-key c new-window -c "#{pane_current_path}"

# ── Copy mode — vi keys ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar — compact for phone screens ────────────────────────────────────
set -g status on
set -g status-position top        # top keeps it visible when phone keyboard is up
set -g status-interval 5

# Palette (works in 256-colour and true-colour terminals)
BG_BAR="#1e2030"
FG_DIM="#636da6"
FG_ACT="#c8d3f5"
COL_MAIN="#82aaff"
COL_SESS="#ffc777"

set -g status-style                 "bg=#1e2030 fg=#636da6"
set -g status-left-length  60
set -g status-right-length 80

# Left: prefix indicator + current session name
set -g status-left \
  "#{?client_prefix,#[fg=#ff757f bold] C-a ,#[fg=#82aaff bold] #S }#[fg=#636da6]│ "

# Centre: window tabs
set -g window-status-separator      ""
set -g window-status-format         "#[fg=#636da6] #I:#W#{?window_activity_flag,!,} "
set -g window-status-current-format "#[fg=#c8d3f5,bg=#2d3f76,bold] #I:#W "

# Right: sessions list (static labels + time)
set -g status-right \
  "#[fg=#636da6]e:code d:claude x:codex r:relay h:share o:other #[fg=#82aaff]%H:%M"

# Pane borders
set -g pane-border-style            "fg=#2d3f76"
set -g pane-active-border-style     "fg=#82aaff"

# Message bar
set -g message-style                "fg=#c8d3f5 bg=#1e2030 bold"
set -g message-command-style        "fg=#ffc777 bg=#1e2030"
